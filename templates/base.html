<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}CV Attendance System{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#333}
nav{background:linear-gradient(135deg,#1a73e8,#0d47a1);padding:0 24px;display:flex;align-items:center;height:60px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
nav .brand{color:#fff;font-size:1.3rem;font-weight:700;text-decoration:none}
nav .brand span{opacity:.7;font-weight:400}
nav .nav-links{margin-left:auto;display:flex;gap:8px}
nav .nav-links a{color:rgba(255,255,255,.85);text-decoration:none;padding:6px 14px;border-radius:20px;font-size:.9rem;transition:background .2s}
nav .nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.2);color:#fff}
.container{max-width:1200px;margin:0 auto;padding:24px 16px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:20px}
.card-title{font-size:1.1rem;font-weight:600;margin-bottom:16px;color:#1a73e8}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08);border-top:4px solid #1a73e8}
.stat-card.green{border-color:#28a745}
.stat-card.red{border-color:#dc3545}
.stat-card.orange{border-color:#ffc107}
.stat-value{font-size:2.2rem;font-weight:700;color:#333}
.stat-label{font-size:.85rem;color:#888;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:500;text-decoration:none;transition:all .2s}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1558b0}
.btn-success{background:#28a745;color:#fff}
.btn-success:hover{background:#1e7e34}
.btn-danger{background:#dc3545;color:#fff}
.btn-danger:hover{background:#bd2130}
.btn-info{background:#17a2b8;color:#fff}
.btn-info:hover{background:#138496}
.btn-warning{background:#ffc107;color:#333}
.btn-warning:hover{background:#e0a800}
.btn-sm{padding:4px 12px;font-size:.8rem}
table{width:100%;border-collapse:collapse}
th{background:#f8f9fa;text-align:left;padding:12px 14px;font-size:.85rem;color:#555;border-bottom:2px solid #dee2e6}
td{padding:11px 14px;border-bottom:1px solid #dee2e6;font-size:.9rem}
tr:hover td{background:#fafbfc}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.78rem;font-weight:600}
.badge-success{background:#d4edda;color:#155724}
.badge-danger{background:#f8d7da;color:#721c24}
.badge-info{background:#d1ecf1;color:#0c5460}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.9rem;font-weight:500;margin-bottom:6px}
.form-control{width:100%;padding:10px 12px;border:1px solid #dee2e6;border-radius:8px;font-size:.9rem;outline:none}
.form-control:focus{border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,.15)}
.alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:.9rem}
.alert-success{background:#d4edda;color:#155724;border-left:4px solid #28a745}
.alert-danger{background:#f8d7da;color:#721c24;border-left:4px solid #dc3545}
.alert-info{background:#d1ecf1;color:#0c5460;border-left:4px solid #17a2b8}
.row{display:flex;gap:20px;flex-wrap:wrap}
.col-8{flex:0 0 66%;max-width:66%}
.col-4{flex:0 0 32%;max-width:32%}
@media(max-width:768px){.col-8,.col-4{flex:0 0 100%;max-width:100%}}
.progress{background:#e9ecef;border-radius:8px;height:10px;overflow:hidden}
.progress-bar{height:100%;border-radius:8px;background:#28a745;transition:width .6s}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-header h1{font-size:1.4rem;font-weight:700}
</style>
</head>
<body>
<nav>
  <a class="brand" href="/">CV Attendance <span>System</span></a>
  <div class="nav-links">
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
    <a href="/students" {% if request.path == '/students' %}class="active"{% endif %}>Students</a>
    <a href="/register" {% if request.path == '/register' %}class="active"{% endif %}>Register</a>
    <a href="/attendance" {% if request.path == '/attendance' %}class="active"{% endif %}>Attendance</a>
  </div>
</nav>
<div class="container">
  {% if request.args.get('msg') %}
    <div class="alert alert-info">{{ request.args.get('msg') }}</div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
